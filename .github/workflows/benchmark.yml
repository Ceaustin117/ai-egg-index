name: Run benchmarks

on:
  schedule:
    # Weekly, Sundays at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Samples per benchmark (omit for full run)"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Judge always uses Groq; per-provider keys gate per-provider runs.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      LIMIT: ${{ github.event.inputs.limit || '5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fail fast if GROQ_API_KEY is missing
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret is required (used by the LLM-as-judge)."
            exit 1
          fi

      - name: Run custom benchmarks across providers
        run: |
          set +e  # continue on per-provider failures

          # provider:model pairs. Edit here to add or change models.
          # NOTE: Together AI was removed — it dropped its standalone free tier (the
          # "-Free" model now needs a credit balance and 402s when empty), and the index
          # is free-tier only.
          PAIRS=(
            "groq:llama-3.1-8b-instant"
            "google:gemini-2.5-flash"
            "cohere:command-r-08-2024"
            "huggingface:meta-llama/Meta-Llama-3-8B-Instruct"
          )

          # Per-provider env var for skip-if-missing
          declare -A KEY_VAR=(
            [groq]=GROQ_API_KEY
            [google]=GOOGLE_API_KEY
            [cohere]=COHERE_API_KEY
            [huggingface]=HF_TOKEN
          )

          for pair in "${PAIRS[@]}"; do
            provider="${pair%%:*}"
            model="${pair#*:}"
            key_var="${KEY_VAR[$provider]}"
            if [ -z "${!key_var}" ]; then
              echo "::warning::Skipping $provider/$model — $key_var not set"
              continue
            fi

            echo "::group::$provider/$model"
            python benchmarks/practical-knowledge/eval.py \
              --provider "$provider" --model "$model" --limit "$LIMIT"
            python benchmarks/creative-technical/eval.py \
              --provider "$provider" --model "$model" --limit "$LIMIT"
            echo "::endgroup::"
          done

      - name: Run openbench evals (IFEval / GSM8K — Groq + Cohere)
        id: openbench
        # Don't abort the pipeline — the custom benchmarks above have already produced
        # results we still want to aggregate and publish. Failure is surfaced loudly in
        # the "Flag openbench failures" step below so a broken eval can't pass silently.
        #
        # Only providers Inspect can run on a free tier in CI: Google's free-tier 429s
        # trigger Inspect's exponential retry-storm (minutes per sample → job timeout),
        # and Inspect's HuggingFace provider runs the model locally (no remote inference),
        # so both are excluded. They keep their two custom benchmarks.
        #
        # DECISION RULE: openbench depends on a fast-moving external stack (openbench /
        # inspect-ai / datasets / huggingface_hub) that has broken this step repeatedly on
        # version drift. It's pinned, but pins rot. The next time this step breaks on a
        # dependency issue, CUT openbench entirely rather than debugging it again — the two
        # custom benchmarks are the index's real value and have ~no external surface to rot.
        continue-on-error: true
        run: |
          set +e
          OPENBENCH_PAIRS=(
            "groq:llama-3.1-8b-instant"
            "cohere:command-r-08-2024"
          )
          rc=0
          for pair in "${OPENBENCH_PAIRS[@]}"; do
            provider="${pair%%:*}"
            model="${pair#*:}"
            echo "::group::openbench $provider/$model"
            python benchmarks/openbench/run.py \
              --provider "$provider" --model "$model" --limit "$LIMIT" || rc=1
            echo "::endgroup::"
          done
          exit $rc

      - name: Aggregate results
        run: python aggregate.py --frontend output/

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "Weekly benchmark run: $DATE"
          git push

      - name: Flag openbench failures
        # Runs after results are committed so the working benchmarks still publish, but
        # fails the job (red badge) if the openbench evals didn't succeed — otherwise a
        # broken IFEval/GSM8K silently drops the index to fewer benchmarks unnoticed.
        if: always() && steps.openbench.outcome != 'success'
        run: |
          echo "::error::openbench evals failed (IFEval/GSM8K missing from this run). Check the 'Run openbench evals' step log."
          exit 1
